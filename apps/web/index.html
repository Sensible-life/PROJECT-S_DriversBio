<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DriveAI Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">DriveAI Prototype</p>
        <h1>운전 전에 넣고, 운전 중에는 말로 푼다.</h1>
        <p class="lede">
          학습 자료를 넣고 퀴즈 세션을 시작하면, 답변 내용을 기준으로 부족한 포인트를 바로
          잡아주는 로컬 프로토타입.
        </p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>API 연결</h2>
          <button id="reloadButton" type="button">새로고침</button>
        </div>
        <label class="field">
          <span>API Base URL</span>
          <input id="apiBaseInput" type="text" value="http://127.0.0.1:3030" />
        </label>
        <p id="healthStatus" class="status">연결 상태 확인 전</p>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <h2>자료 등록</h2>
            <button id="createSourceButton" type="button">저장</button>
          </div>
          <label class="field">
            <span>제목</span>
            <input id="sourceTitleInput" type="text" placeholder="예: 운영체제 1장" />
          </label>
          <label class="field">
            <span>내용</span>
            <textarea
              id="sourceContentInput"
              rows="12"
              placeholder="강의 노트, 책 요약, 암기 포인트를 붙여 넣으세요."
            ></textarea>
          </label>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>자료 목록</h2>
            <span id="sourceCountLabel">0개</span>
          </div>
          <div id="sourcesList" class="list"></div>
        </article>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>세션</h2>
          <span id="sessionStatusLabel">대기 중</span>
        </div>
        <p id="questionPrompt" class="question">세션을 시작하면 질문이 여기에 표시됩니다.</p>
        <label class="field">
          <span>답변 입력</span>
          <textarea id="answerInput" rows="5" placeholder="음성 대신 텍스트로 시뮬레이션"></textarea>
        </label>
        <div class="actions">
          <button id="submitAnswerButton" type="button" disabled>답변 제출</button>
        </div>
        <div id="feedbackCard" class="feedback hidden">
          <h3>피드백</h3>
          <p id="feedbackText"></p>
          <p id="feedbackMeta" class="meta"></p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
