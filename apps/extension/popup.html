<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DriveAI Capture</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        padding: 16px;
        font-family: "Aptos", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #fef5ea, #eef8f5);
        color: #1f2933;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.1rem;
      }

      label,
      textarea,
      input,
      button {
        display: block;
        width: 100%;
      }

      label {
        margin-bottom: 10px;
        font-size: 0.86rem;
      }

      input,
      textarea {
        margin-top: 6px;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid rgba(31, 41, 51, 0.12);
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      button {
        margin-top: 12px;
        border: none;
        border-radius: 999px;
        padding: 10px 14px;
        background: #116466;
        color: white;
        font: inherit;
        cursor: pointer;
      }

      p {
        margin: 8px 0 0;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h1>DriveAI Capture</h1>
    <label>
      API Base URL
      <input id="apiBaseInput" type="text" value="http://127.0.0.1:3030" />
    </label>
    <label>
      제목
      <input id="titleInput" type="text" />
    </label>
    <label>
      내용
      <textarea id="contentInput"></textarea>
    </label>
    <button id="captureButton" type="button">선택 영역 불러오기</button>
    <button id="saveButton" type="button">DriveAI에 저장</button>
    <p id="statusText">대기 중</p>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
